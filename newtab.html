<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="bg"></div>
  <div id="bg-img"></div>
  <div id="overlay"></div>

  <!-- Normal view -->
  <div id="main">
    <div id="time-display"></div>
    <div id="greeting"></div>
    <div id="streak-main" role="button" tabindex="0" aria-label="View streak history"></div>
  </div>

  <div id="quote-container">
    <p id="quote-text"></p>
    <p id="quote-author"></p>
  </div>

  <!-- Focus / Pomodoro view -->
  <div id="focus-panel">
    <div id="timer-display">25:00</div>
    <div id="timer-controls">
      <button id="start-pause-btn" aria-label="Start">
        <svg id="icon-play" width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg id="icon-pause" width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button id="reset-btn" aria-label="Reset">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
      </button>
    </div>
    <div id="streak-row">
      <div id="streak-dots"></div>
      <div id="streak-count"></div>
    </div>
  </div>

  <button id="focus-toggle" aria-label="Focus mode">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="4" cy="4" r="2"/><path d="m14 5 3-3 3 3"/><path d="m14 10 3-3 3 3"/><path d="M17 14V2"/><path d="M17 14H7l-5 8h20Z"/><path d="M8 14v8"/><path d="m9 14 5 8"/>
    </svg>
  </button>

  <div id="name-prompt" class="hidden">
    <p id="name-label">What should I call you?</p>
    <input id="name-input" type="text" placeholder="Your name" autocomplete="off" spellcheck="false" maxlength="30">
  </div>

  <div id="calendar-backdrop" class="hidden"></div>
  <div id="calendar-popup" class="hidden">
    <div id="calendar-inner"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
